system:
  timeframe: 4H
  prediction_horizon_bars: 1
  retrain_frequency: weekly
  rolling_window_months: 24
assets:
- BTC_USDT
- ETH_USDT
- SOL_USDT
- BNB_USDT
- XRP_USDT
- AVAX_USDT
- LINK_USDT
- DOGE_USDT
- ADA_USDT
- LTC_USDT
- AAVE_USDT
- SUI_USDT
data:
  source: gate
  csv_dir: quant_system/data/csv
  timezone: UTC
  gate:
    candles_limit: 2000
    request_sleep_sec: 0.12
features:
  atr_period: 14
  rolling_std_period: 20
  ema_fast: 12
  ema_slow: 48
  volume_zscore_period: 20
strategy:
  threshold_quantile: 0.8
risk:
  starting_equity: 10000.0
  risk_per_trade: 0.002
  max_portfolio_risk: 0.03
  atr_multiplier: 3.0
execution:
  slippage_bps: 2.0
  fee_rate: 0.0004
  allow_flip: false
  close_on_signal_change: false
  max_open_pairs: 5
  leverage_min: 5
  leverage_max: 30
  short_tpsl_override: true
  short_sl_mult: 0.6
  short_tp_mult: 0.6
  trigger_rule: 1
display:
  usdt_to_idr: 16000
  starting_capital_usdt: 1375.0
execution_mode: TESTNET
gate:
  api_key: ''
  api_secret: ''
  base_url: https://api-testnet.gateapi.io/api/v4
model:
  model_type: lightgbm_regressor
  min_train_rows: 18
  categorical_features:
  - asset
  params:
    n_estimators: 600
    learning_rate: 0.03
    num_leaves: 31
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    random_state: 42
paths:
  db_path: quant_system/database/quant_system.sqlite
  schema_path: quant_system/database/schema.sql
  models_dir: quant_system/models
  reports_dir: quant_system/reports
logging:
  level: INFO
  json: true
